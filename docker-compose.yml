services:
  mysql:
    image: mysql:8.0
    container_name: sons_of_lilith_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sons_of_lilith
      MYSQL_USER: soluser
      MYSQL_PASSWORD: solpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: